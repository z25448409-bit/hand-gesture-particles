<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>3D Gesture Particles - Pro Version</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #video-container {
            position: fixed; bottom: 20px; left: 20px; width: 200px; height: 150px;
            border: 2px solid #00ffcc; border-radius: 12px; overflow: hidden;
            z-index: 100; background: #111; box-shadow: 0 0 20px rgba(0,255,204,0.3);
        }
        #preview-canvas { width: 100%; height: 100%; transform: scaleX(-1); object-fit: cover; }
        .status-tag {
            position: fixed; bottom: 180px; left: 20px; color: #00ffcc;
            font-size: 12px; background: rgba(0,0,0,0.6); padding: 5px 10px;
            border-radius: 4px; z-index: 100; backdrop-filter: blur(4px);
        }
        #canvas-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <div id="video-container"><canvas id="preview-canvas"></canvas></div>
    <video id="input_video" style="display:none;"></video>
    <div class="status-tag">系统状态：初始化中...</div>
    <div id="canvas-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.17.0/dist/lil-gui.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const PARTICLE_COUNT = 15000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const targetPositions = new Float32Array(PARTICLE_COUNT * 3);

        const Shapes = {
            Sphere: (arr) => {
                for(let i=0; i<PARTICLE_COUNT; i++) {
                    const phi = Math.acos(-1 + (2 * i) / PARTICLE_COUNT);
                    const theta = Math.sqrt(PARTICLE_COUNT * Math.PI) * phi;
                    arr[i*3] = Math.cos(theta) * Math.sin(phi) * 2;
                    arr[i*3+1] = Math.sin(theta) * Math.sin(phi) * 2;
                    arr[i*3+2] = Math.cos(phi) * 2;
                }
            },
            Lucky: (arr) => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 240; canvas.height = 120;
                ctx.fillStyle = 'white';
                ctx.font = 'bold 50px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('LUCKY', 120, 70);
                const data = ctx.getImageData(0, 0, 240, 120).data;
                const points = [];
                for(let y=0; y<120; y++) {
                    for(let x=0; x<240; x++) {
                        if(data[(y*240 + x)*4] > 128) points.push({x: (x-120)/20, y: (60-y)/20});
                    }
                }
                for(let i=0; i<PARTICLE_COUNT; i++) {
                    const p = points[i % points.length];
                    arr[i*3] = p.x + (Math.random()-0.5)*0.1;
                    arr[i*3+1] = p.y + (Math.random()-0.5)*0.1;
                    arr[i*3+2] = (Math.random()-0.5)*0.5; // 增加厚度
                }
            },
            ChristmasTree: (arr) => {
                for(let i=0; i<PARTICLE_COUNT; i++) {
                    let x, y, z;
                    if(i < PARTICLE_COUNT * 0.9) {
                        const h = Math.random() * 3;
                        const radius_at_h = (3 - h) * 0.5;
                        const angle = Math.random() * Math.PI * 2;
                        const r = Math.sqrt(Math.random()) * radius_at_h;
                        x = Math.cos(angle) * r;
                        z = Math.sin(angle) * r;
                        y = h - 1.5;
                    } else {
                        const angle = Math.random() * Math.PI * 2;
                        const r = 0.2;
                        const h = Math.random() * 1;
                        x = Math.cos(angle) * r;
                        z = Math.sin(angle) * r;
                        y = h - 2.5;
                    }
                    arr[i*3] = x; arr[i*3+1] = y; arr[i*3+2] = z;
                }
            }
        };

        Shapes.Sphere(targetPositions);
        for(let i=0; i<positions.length; i++) positions[i] = (Math.random()-0.5)*10;

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const material = new THREE.PointsMaterial({ 
            color: 0x00ffcc, 
            size: 0.02, 
            blending: THREE.AdditiveBlending, 
            transparent: true, 
            opacity: 0.8 
        });
        const points = new THREE.Points(geometry, material);
        scene.add(points);

        const videoElement = document.getElementById('input_video');
        const previewCanvas = document.getElementById('preview-canvas');
        const previewCtx = previewCanvas.getContext('2d');
        const statusTag = document.querySelector('.status-tag');

        let currentScale = 1.0, targetRotX = 0, targetRotY = 0;

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6 });

        hands.onResults((results) => {
            previewCanvas.width = videoElement.videoWidth;
            previewCanvas.height = videoElement.videoHeight;
            if (results.image) previewCtx.drawImage(results.image, 0, 0, previewCanvas.width, previewCanvas.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                statusTag.innerText = "状态：已锁定手部";
                const lm = results.multiHandLandmarks[0];
                const dist = Math.sqrt(Math.pow(lm[4].x - lm[8].x, 2) + Math.pow(lm[4].y - lm[8].y, 2));
                currentScale = THREE.MathUtils.lerp(currentScale, dist * 10 + 0.1, 0.1);
                
                // 修复镜像逻辑：手往左(x变小)，targetRotY 应该减小
                targetRotY = (0.5 - lm[0].x) * Math.PI * 2;
                targetRotX = (lm[0].y - 0.5) * Math.PI;
            } else {
                statusTag.innerText = "状态：未发现手部";
            }
        });

        const cam_mp = new Camera(videoElement, { 
            onFrame: async () => { await hands.send({image: videoElement}); }, 
            width: 640, height: 480 
        });
        cam_mp.start();

        const gui = new lil.GUI();
        const settings = { shape: 'Sphere', color: '#00ffcc', size: 0.02 };
        gui.add(settings, 'shape', Object.keys(Shapes)).onChange(v => Shapes[v](targetPositions));
        gui.addColor(settings, 'color').onChange(v => material.color.set(v));
        gui.add(settings, 'size', 0.005, 0.1).name('粒子大小').onChange(v => material.size = v);

        function animate() {
            requestAnimationFrame(animate);
            points.rotation.y += (targetRotY - points.rotation.y) * 0.05;
            points.rotation.x += (targetRotX - points.rotation.x) * 0.05;
            const posAttr = geometry.attributes.position;
            for(let i=0; i<PARTICLE_COUNT * 3; i++) {
                posAttr.array[i] += (targetPositions[i] * currentScale - posAttr.array[i]) * 0.08;
            }
            posAttr.needsUpdate = true;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
